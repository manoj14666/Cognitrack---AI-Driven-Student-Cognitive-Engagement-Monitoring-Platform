{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-7">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
            <div class="card-header border-0 text-white text-center py-4" style="background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%);">
                <h3 class="mb-0 fw-bold"><i class="fas fa-user-plus me-2"></i> Register</h3>
                <p class="mb-0 mt-2 text-white-50">Create your account for the portal.</p>
            </div>
            <div class="card-body p-5">
                <form method="POST" id="registerForm">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="username" name="username" value="{{ username|default('') }}" required placeholder="Ex: Manoj">
                    </div>
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control form-control-lg rounded-3" id="email" name="email" value="{{ email|default('') }}" required placeholder="Ex: manoj@example.com">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg rounded-3" id="password" name="password" required>
                    </div>
                    <div class="mb-4 d-none">
                        <label for="role" class="form-label fw-semibold">Role</label>
                        <select class="form-select form-select-lg rounded-3" id="role" name="role" required>
                            <option value="student" selected>Student</option>
                        </select>
                    </div>

                    <!-- Face Catch Section -->
                    <div class="mb-4" id="webcam-section" style="display: block;">
                        <label class="form-label fw-semibold text-primary"><i class="fas fa-camera"></i> Face Registration</label>
                        <p class="text-muted small mb-2">Please upload multiple clear images (up to 5) OR capture via webcam to greatly improve attendance accuracy.</p>
                        
                        <!-- Upload Option -->
                        <div class="mb-3 bg-light p-3 rounded-4 border">
                            <label class="form-label fw-bold mb-1"><i class="fas fa-upload"></i> Upload Images (Recommended)</label>
                            <input class="form-control mb-2" type="file" id="faceUploads" accept="image/*" multiple onchange="handleFileUploads()">
                            <div id="uploadPreviews" class="d-flex gap-2 flex-wrap"></div>
                        </div>

                        <div class="text-center my-3 text-muted fw-bold">OR WEBCAM</div>

                        <!-- Webcam Option -->
                        <div class="position-relative bg-dark rounded-4 overflow-hidden shadow-sm" style="width: 100%; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;">
                            <video id="videoElement" autoplay playsinline style="width: 100%; height: 100%; object-fit: cover;"></video>
                            <canvas id="canvasElement" style="display:none;"></canvas>
                        </div>
                        <input type="hidden" name="face_image" id="face_image">
                        <div class="mt-3 d-flex gap-2">
                            <button type="button" class="btn btn-primary" id="captureBtn" onclick="captureFace()"><i class="fas fa-camera"></i> Capture Webcam Face</button>
                            <p id="captureCountText" class="text-muted ms-2 my-auto" style="display: none;">0 captured</p>
                        </div>
                    </div>

                    <div class="d-grid mt-5">
                        <button type="button" id="submitBtn" class="btn btn-success btn-lg rounded-3 fw-bold shadow-sm" onclick="validateAndSubmit()">
                            <span id="submitText"><i class="fas fa-user-plus me-2"></i> Create Account</span>
                            <span id="loadingSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-3 text-muted">Already have an account?</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary px-4 rounded-pill">
                        <i class="fas fa-sign-in-alt me-1"></i> Login Here
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let videoStream;
    let uploadedImagesData = [];

    window.onload = function() {
        toggleWebcam();
    };

    function toggleWebcam() {
        const role = document.getElementById('role').value;
        const webcamSection = document.getElementById('webcam-section');
        
        if (role === 'student') {
            webcamSection.style.display = 'block';
            startWebcam();
        } else {
            webcamSection.style.display = 'none';
            stopWebcam();
        }
    }

    async function startWebcam() {
        try {
            const video = document.getElementById('videoElement');
            videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = videoStream;
        } catch (err) {
            console.error("Error accessing webcam: ", err);
        }
    }

    function stopWebcam() {
        if (videoStream) {
            videoStream.getTracks().forEach(track => track.stop());
        }
    }

    function handleFileUploads() {
        const files = document.getElementById('faceUploads').files;
        if (!files.length) return;
        
        for (let i = 0; i < files.length; i++) {
            if (uploadedImagesData.length >= 5) break;
            const reader = new FileReader();
            reader.onload = function(e) {
                const dataUrl = e.target.result;
                addImageToCollection(dataUrl);
            };
            reader.readAsDataURL(files[i]);
        }
        // clear input so same files can be re-added if user desires
        document.getElementById('faceUploads').value = "";
    }

    function captureFace() {
        if (uploadedImagesData.length >= 5) {
            alert("Maximum 5 images allowed.");
            return;
        }
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const context = canvas.getContext('2d');
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const imageDataUrl = canvas.toDataURL('image/jpeg');
        addImageToCollection(imageDataUrl);
    }
    
    function addImageToCollection(dataUrl) {
        uploadedImagesData.push(dataUrl);
        
        const previewDiv = document.createElement('div');
        previewDiv.style = "position: relative; width: 60px; height: 60px;";
        
        const img = document.createElement('img');
        img.src = dataUrl;
        img.style = "width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1px solid #ccc;";
        
        const deleteBtn = document.createElement('button');
        deleteBtn.innerHTML = "×";
        deleteBtn.style = "position: absolute; top: -5px; right: -5px; background: red; height: 20px; width: 20px; border-radius: 50%; color: white; border: none; font-size: 12px; line-height: 1px; padding: 0; cursor: pointer;";
        deleteBtn.onclick = function() {
            previewDiv.remove();
            uploadedImagesData = uploadedImagesData.filter(i => i !== dataUrl);
            updateHiddenInput();
        };
        
        previewDiv.appendChild(img);
        previewDiv.appendChild(deleteBtn);
        document.getElementById('uploadPreviews').appendChild(previewDiv);
        
        updateHiddenInput();
    }

    function updateHiddenInput() {
        document.getElementById('face_image').value = JSON.stringify(uploadedImagesData);
        
        const countTxt = document.getElementById('captureCountText');
        countTxt.style.display = 'inline-block';
        countTxt.innerHTML = uploadedImagesData.length + " face(s) provided. (Max 5)";
    }

    function validateAndSubmit() {
        const role = document.getElementById('role').value;
        const faceInput = document.getElementById('face_image').value;
        
        if (role === 'student' && (!faceInput || faceInput === "[]")) {
            alert('Please provide at least 1 image either via upload or webcam before creating an account.');
            return;
        }
        
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loadingSpinner = document.getElementById('loadingSpinner');
        
        if (submitBtn && submitText && loadingSpinner) {
            submitBtn.disabled = true;
            submitText.innerHTML = 'Processing (Takes up to 60s per face registered)... ';
            loadingSpinner.classList.remove('d-none');
        }
        
        document.getElementById('registerForm').submit();
    }
</script>
{% endblock %}
