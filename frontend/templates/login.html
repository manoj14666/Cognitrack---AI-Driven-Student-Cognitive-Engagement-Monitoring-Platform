{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden" style="background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);">
            <div class="card-header border-0 text-white text-center py-4" style="background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%);">
                <h3 class="mb-0 fw-bold"><i class="fas fa-sign-in-alt me-2"></i> Login</h3>
                <p class="mb-0 mt-2 text-white-50">Welcome back to the portal</p>
            </div>
            <div class="card-body p-5">
                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control form-control-lg rounded-3" id="username" name="username" required placeholder="Enter username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">Password</label>
                        <input type="password" class="form-control form-control-lg rounded-3" id="password" name="password" required placeholder="Enter password">
                    </div>
                    <div class="d-grid mt-5">
                        <button type="submit" class="btn btn-primary btn-lg rounded-3 fw-bold shadow-sm" style="background: linear-gradient(135deg, #1A2980 0%, #26D0CE 100%); border: none;">
                            <i class="fas fa-sign-in-alt me-2"></i> Sign In
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                <div class="text-center">
                    <p class="mb-3 text-muted">Don't have an account?</p>
                    <a href="{{ url_for('register') }}" class="btn btn-outline-primary px-4 rounded-pill">
                        <i class="fas fa-user-plus me-1"></i> Create Account
                    </a>
                </div>
                
                <div class="mt-4">
                    <div class="alert alert-info border-0 rounded-3" style="background-color: rgba(38, 208, 206, 0.1); color: #1A2980;">
                        <h6 class="fw-bold"><i class="fas fa-info-circle me-1"></i> Demo Accounts</h6>
                        <small class="d-block mt-2">
                            <strong>Teacher:</strong> username: teacher, password: password<br>
                            <strong>Student:</strong> Register a new account to setup face recognition
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
